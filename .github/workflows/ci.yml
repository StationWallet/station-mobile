name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # TODO: remove continue-on-error once pre-existing lint errors are fixed
    # (~161 errors: explicit-function-return-type, no-explicit-any, no-console)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    # TODO: remove continue-on-error once pre-existing type errors are fixed
    # (19 errors in storage.ts, wallet.ts, currency types)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    # TODO: remove continue-on-error once terra polyfill tests are fixed
    # (2 failures in terra-keys.test.js, terra-msgs.test.js — secp256k1 API mismatch)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
