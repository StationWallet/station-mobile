name: E2E Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - '.detoxrc.js'
      - '.github/workflows/e2e.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'ios/**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detox:
    name: Detox iOS
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
      AGENTMAIL_EMAIL: ${{ secrets.AGENTMAIL_EMAIL }}
      VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # expo-modules-core 55.x requires Swift 6.2+ (Isolated Conformances
      # syntax). Xcode 16.4 (the macos-latest default) only has Swift 6.1.
      # Xcode 26.3 ships Swift 6.2 and is pre-installed on the runner.
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install applesimutils
        run: brew tap wix/brew && brew install applesimutils

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Restore Xcode build cache
        uses: actions/cache/restore@v4
        with:
          path: ios/build
          key: detox-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'ios/Podfile.lock') }}
          restore-keys: |
            detox-build-${{ runner.os }}-

      - name: Build for Detox
        run: npx detox build --configuration ios.sim.release

      - name: Save Xcode build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ios/build
          key: detox-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'ios/Podfile.lock') }}

      - name: Boot simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if 'iPhone 16' in d['name']:
                      print(d['udid']); sys.exit()
          ")
          xcrun simctl boot "$DEVICE" || true

      - name: Run E2E tests
        run: npx detox test --configuration ios.sim.release --headless --cleanup

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: artifacts/
          retention-days: 7
