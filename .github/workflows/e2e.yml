name: E2E Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - '.detoxrc.js'
      - '.github/workflows/e2e.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'ios/**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detox:
    name: Detox iOS
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
      AGENTMAIL_EMAIL: ${{ secrets.AGENTMAIL_EMAIL }}
      VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # expo-modules-core 55.x uses Swift 6 syntax (@MainActor on
      # conformances) but has strict concurrency violations. Xcode 16.1
      # is the minimum for RN 0.83. We also patch the Podfile to relax
      # concurrency checking on all Pod targets.
      - name: Select Xcode 16.1
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Relax Swift 6 strict concurrency for Pods
        run: |
          ruby -i -pe '
            if /react_native_post_install/ && !$injected
              $injected = true
            elsif $injected && /^\s*\)/ && !$done
              $done = true
              $_ += <<~RUBY

                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |bc|
                    bc.build_settings["SWIFT_STRICT_CONCURRENCY"] = "minimal"
                    existing = bc.build_settings["OTHER_SWIFT_FLAGS"] || "$(inherited)"
                    bc.build_settings["OTHER_SWIFT_FLAGS"] = existing + " -Xfrontend -strict-concurrency=minimal" unless existing.include?("-strict-concurrency")
                  end
                end
              RUBY
            end
          ' ios/Podfile

      - name: Cache Xcode build
        uses: actions/cache@v4
        with:
          path: ios/build
          key: detox-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'ios/Podfile.lock') }}
          restore-keys: |
            detox-build-${{ runner.os }}-

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build for Detox
        run: npx detox build --configuration ios.sim.release

      - name: Boot simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if 'iPhone 16' in d['name']:
                      print(d['udid']); sys.exit()
          ")
          xcrun simctl boot "$DEVICE" || true

      - name: Run E2E tests
        run: npx detox test --configuration ios.sim.release --headless --cleanup

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: artifacts/
          retention-days: 7
