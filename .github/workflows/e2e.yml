name: E2E Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - '.detoxrc.js'
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'ios/**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detox:
    name: Detox iOS
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
      AGENTMAIL_EMAIL: ${{ secrets.AGENTMAIL_EMAIL }}
      VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Fix Swift 6 concurrency errors in Pods
        run: |
          # Xcode 16.4+ defaults to Swift 6 which breaks expo-modules-core.
          # Inject post_install hook to pin pods to Swift 5 language mode.
          ruby -i -pe '
            if /react_native_post_install/ && !$injected
              $injected = true
            elsif $injected && /^\s*\)/ && !$done
              $done = true
              $_ += <<~RUBY

                # [CI] Pin Pod targets to Swift 5 for Xcode 16.4+ compat
                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |bc|
                    bc.build_settings["SWIFT_STRICT_CONCURRENCY"] ||= "minimal"
                    bc.build_settings["SWIFT_VERSION"] ||= "5.0"
                  end
                end
              RUBY
            end
          ' ios/Podfile

      - name: Cache Xcode build
        uses: actions/cache@v4
        with:
          path: ios/build
          key: detox-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'ios/Podfile.lock') }}
          restore-keys: |
            detox-build-${{ runner.os }}-

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build for Detox
        run: npx detox build --configuration ios.sim.release

      - name: Boot simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if 'iPhone 16' in d['name']:
                      print(d['udid']); sys.exit()
          ")
          xcrun simctl boot "$DEVICE" || true

      - name: Run E2E tests
        run: npx detox test --configuration ios.sim.release --headless --cleanup

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: artifacts/
          retention-days: 7
